name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg

      - name: Run build
        run: |
          chmod +x cicd/run_make.sh
          ./cicd/run_make.sh

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker
          path: usr/bin/prime-checker

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Run tests
        run: |
          chmod +x cicd/run_tests.sh
          ./cicd/run_tests.sh

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg

      - name: Build package
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/*.deb