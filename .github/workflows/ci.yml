name: CI Pipeline

permissions:
  contents: write
  packages: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/prime-checker

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Run build script
        run: |
          chmod +x cicd/run_make.sh
          ./cicd/run_make.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v5
        with:
          name: prime-checker-binary
          path: usr/bin/prime-checker

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build binary for tests
        run: |
          chmod +x cicd/run_make.sh
          ./cicd/run_make.sh

      - name: Run tests
        run: |
          chmod +x cicd/run_tests.sh
          ./cicd/run_tests.sh

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg

      - name: Build deb package
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: prime-checker-deb
          path: build/*.deb

  docker:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build deb package for Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Run Docker stage
        run: |
          chmod +x cicd/run_docker.sh
          ./cicd/run_docker.sh

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE_NAME:latest .
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            docker tag $IMAGE_NAME:latest $IMAGE_NAME:$TAG_NAME
            docker push $IMAGE_NAME:$TAG_NAME
          fi
          docker push $IMAGE_NAME:latest

  release:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg

      - name: Build release package
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}