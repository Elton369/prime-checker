name: CI Pipeline

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Run build script
        run: |
          chmod +x cicd/run_make.sh
          ./cicd/run_make.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-binary
          path: usr/bin/prime-checker

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Build binary for tests
        run: |
          chmod +x cicd/run_make.sh
          ./cicd/run_make.sh

      - name: Run tests
        run: |
          chmod +x cicd/run_tests.sh
          ./cicd/run_tests.sh

  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg

      - name: Build deb package
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-deb
          path: build/*.deb

  release:
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y build-essential dpkg

      - name: Build release package
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh
          chmod +x cicd/run_release.sh
          ./cicd/run_release.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}