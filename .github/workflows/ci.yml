name: CI Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build program
        run: |
          chmod +x cicd/run_make.sh
          ./cicd/run_make.sh

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-binary
          path: usr/bin/prime-checker


  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          chmod +x cicd/run_tests.sh
          ./cicd/run_tests.sh


  package:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential dpkg

      - name: Build deb package
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: prime-checker-deb
          path: build/*.deb


  docker:
    runs-on: ubuntu-latest
    needs: package

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Docker stage
        run: |
          chmod +x cicd/run_docker.sh
          ./cicd/run_docker.sh


  release:
    runs-on: ubuntu-latest
    needs: docker
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build package again
        run: |
          chmod +x cicd/run_package.sh
          ./cicd/run_package.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*.deb