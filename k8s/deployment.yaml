apiVersion: apps/v1
kind: Deployment
metadata:
  name: prime-checker
  namespace: prime-checker
  labels:
    app: prime-checker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: prime-checker
  template:
    metadata:
      labels:
        app: prime-checker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: prime-checker
          image: ghcr.io/elton369/prime-checker:v1.3.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10